[pytest]
# Import mode: prevents sys.path shadowing when capacium is pip-installed
addopts = --import-mode=importlib

# Test paths
testpaths = tests/unit

# Markers
markers =
    adapter: adapter unit tests
    contract: shared contract tests across all adapters
    edge_case: adapter-specific edge case tests
    slow: tests that take more than 2s

# Output
log_cli = false
