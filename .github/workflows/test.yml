name: Capacium Test Lab

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'frameworks/**'
      - 'scripts/**'
      - 'tests/**'
      - 'docker-compose.yml'
      - 'Dockerfile.runner'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'frameworks/**'
      - 'scripts/**'
      - 'tests/**'
      - 'docker-compose.yml'
      - 'Dockerfile.runner'
  workflow_dispatch:

jobs:
  # ── Job 1: Adapter contract unit tests (pytest, no Docker required) ──────
  unit-tests:
    name: "Adapter contract tests (pytest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone capacium core
        run: git clone --depth 1 https://github.com/Capacium/capacium.git /tmp/capacium

      - name: Install capacium (editable)
        run: pip install --no-cache-dir -e /tmp/capacium

      - name: Install pytest
        run: pip install pytest

      - name: Run adapter contract tests
        run: pytest tests/unit/ -v --tb=short -m "not slow"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .benchmarks/

  # ── Job 2: Framework integration tests (Docker) ─────────────────────────
  framework-tests:
    name: "${{ matrix.framework }} + ${{ matrix.capability }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [opencode, claude-code, codex-cli, gemini-cli, continue]
        capability: [test-skill, test-mcp-server]
    steps:
      - uses: actions/checkout@v4

      - name: Clone agent-test-env base
        run: |
          git clone --depth 1 https://github.com/LangeVC/agent-test-env.git /tmp/agent-test-env
          cp -r /tmp/agent-test-env/frameworks/* frameworks/
          rm -rf /tmp/agent-test-env

      - name: Clone capacium core
        run: git clone --depth 1 https://github.com/Capacium/capacium.git /tmp/capacium

      - name: Build cap from source
        run: |
          cd /tmp/capacium
          pip install --no-cache-dir -e .

      - name: Setup Docker
        run: docker compose version

      - name: Build framework
        run: docker compose build ${{ matrix.framework }}

      - name: Start framework
        run: docker compose up -d ${{ matrix.framework }}

      - name: Wait for health
        run: docker compose wait ${{ matrix.framework }}

      - name: Build test-runner
        run: docker compose build --build-arg CAP_SRC=/tmp/capacium test-runner

      - name: Test capability
        run: docker compose run --rm test-runner "${{ matrix.framework }}" "${{ matrix.capability }}"

      - name: Cleanup
        if: always()
        run: docker compose down -v
